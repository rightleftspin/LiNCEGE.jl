name: Benchmarks
on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install BenchmarkCI
        run: julia -e 'using Pkg; Pkg.add(name="BenchmarkCI", version="0.1.8")'
      - name: Run benchmarks
        run: |
          julia -e '
            using BenchmarkCI
            BenchmarkCI.judge(baseline="origin/main")
            BenchmarkCI.postjudge()
          '
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
